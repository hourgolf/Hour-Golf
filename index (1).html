<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hour Golf — Member Usage Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'IBM Plex Mono', monospace; background: #f5f3ef; color: #2a2a2a; -webkit-font-smoothing: antialiased; }
    
    .header { background: #1a472a; color: #fff; padding: 20px 24px; }
    .header-inner { display: flex; justify-content: space-between; align-items: center; max-width: 1100px; margin: 0 auto; }
    .logo { font-size: 18px; letter-spacing: 6px; font-weight: 700; }
    .logo-sub { font-size: 11px; opacity: 0.6; letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
    .header-stats { display: flex; gap: 20px; align-items: center; }
    .stat-box { display: flex; flex-direction: column; align-items: center; }
    .stat-val { font-size: 22px; font-weight: 700; }
    .stat-lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; }
    .refresh-btn { padding: 8px 14px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); border-radius: 4px; color: #fff; cursor: pointer; font-size: 12px; font-family: inherit; margin-left: 16px; }
    .refresh-btn:hover { background: rgba(255,255,255,0.25); }
    
    .nav { display: flex; border-bottom: 2px solid #1a472a; background: #fff; max-width: 1100px; margin: 0 auto; }
    .nav-btn { padding: 12px 20px; border: none; background: transparent; cursor: pointer; font-size: 12px; font-family: inherit; color: #888; letter-spacing: 1px; }
    .nav-btn.active { color: #1a472a; font-weight: 700; border-bottom: 2px solid #1a472a; margin-bottom: -2px; }
    
    .content { max-width: 1100px; margin: 0 auto; padding: 20px; }
    
    .month-sel { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 20px; }
    .mo-btn { padding: 6px 12px; border: 1px solid #ddd; border-radius: 4px; background: #fff; cursor: pointer; font-size: 11px; font-family: inherit; }
    .mo-btn.active { border-color: #1a472a; background: #1a472a; color: #fff; font-weight: 700; }
    
    .summary { display: flex; gap: 24px; padding: 16px 20px; background: #fff; border-radius: 8px; margin-bottom: 24px; border: 1px solid #e0ddd6; }
    .sum-item { display: flex; flex-direction: column; }
    .sum-val { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .sum-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #888; }
    
    .section-head { font-size: 13px; text-transform: uppercase; letter-spacing: 2px; color: #1a472a; margin: 0 0 12px; border-bottom: 1px solid #1a472a; padding-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    
    .table { background: #fff; border-radius: 8px; border: 1px solid #e0ddd6; overflow: hidden; margin-bottom: 16px; }
    .t-head { display: flex; padding: 10px 16px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #888; border-bottom: 1px solid #e0ddd6; gap: 8px; }
    .t-row { display: flex; padding: 12px 16px; border-bottom: 1px solid #f0ede6; align-items: center; gap: 8px; font-size: 13px; }
    .t-row:last-child { border-bottom: none; }
    .t-row.clickable { cursor: pointer; }
    .t-row.clickable:hover { background: #faf9f6; }
    .t-row.cancelled { opacity: 0.45; text-decoration: line-through; }
    
    .badge { display: inline-block; padding: 3px 10px; border-radius: 3px; color: #fff; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
    .tier-select { padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; font-family: inherit; background: #fff; }
    
    .email-sm { font-size: 11px; color: #999; }
    .muted { font-size: 11px; color: #999; }
    .tab-num { font-variant-numeric: tabular-nums; }
    .text-r { text-align: right; }
    .text-c { text-align: center; }
    .red { color: #cc4455; }
    .green { color: #4a7c59; }
    .bold { font-weight: 700; }
    
    .search-input { width: 100%; padding: 10px 16px; border: 1px solid #e0ddd6; border-radius: 8px; font-size: 14px; font-family: inherit; margin-bottom: 16px; background: #fff; }
    
    .detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding: 16px 20px; background: #fff; border-radius: 8px; border: 1px solid #e0ddd6; }
    
    .saving-bar { text-align: center; padding: 8px; background: #fffbeb; color: #a67c00; font-size: 12px; font-weight: 700; letter-spacing: 1px; }
    
    .setup { max-width: 480px; margin: 0 auto; padding: 80px 24px; text-align: center; }
    .setup-input { width: 100%; padding: 12px 16px; border: 2px solid #1a472a; border-radius: 6px; font-size: 14px; font-family: inherit; margin-bottom: 16px; }
    .setup-btn { width: 100%; padding: 14px; background: #1a472a; color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 700; letter-spacing: 2px; cursor: pointer; font-family: inherit; }
    .setup-btn:hover { background: #245a35; }
    .setup-btn:disabled { opacity: 0.5; cursor: default; }
    .error { color: #c45; font-size: 13px; margin-bottom: 12px; text-align: left; }

    /* Action buttons */
    .act-btn { padding: 4px 10px; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer; font-size: 11px; font-family: inherit; letter-spacing: 0.5px; }
    .act-btn:hover { background: #f5f3ef; }
    .act-btn.danger { border-color: #cc4455; color: #cc4455; }
    .act-btn.danger:hover { background: #fef2f2; }
    .act-btn.primary { border-color: #1a472a; color: #1a472a; font-weight: 700; }
    .act-btn.primary:hover { background: #1a472a; color: #fff; }
    .act-btn:disabled { opacity: 0.4; cursor: default; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal { background: #fff; border-radius: 12px; padding: 28px; width: 90%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
    .modal h2 { font-size: 16px; letter-spacing: 2px; text-transform: uppercase; color: #1a472a; margin-bottom: 20px; }
    .modal-field { margin-bottom: 16px; }
    .modal-field label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #555; margin-bottom: 6px; }
    .modal-field input, .modal-field select, .modal-field textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; font-family: inherit; background: #fff; }
    .modal-field textarea { resize: vertical; min-height: 60px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 24px; }
    .modal-actions .act-btn { padding: 10px 20px; font-size: 13px; }

    /* Toast notifications */
    .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 6px; font-size: 13px; font-family: inherit; font-weight: 500; z-index: 2000; animation: slideUp 0.3s ease; }
    .toast.success { background: #1a472a; color: #fff; }
    .toast.error { background: #cc4455; color: #fff; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    /* Confirm dialog */
    .confirm-box { text-align: center; }
    .confirm-box p { font-size: 14px; line-height: 1.6; margin-bottom: 8px; }
    .confirm-box .muted { margin-bottom: 20px; display: block; }
    
    @media (max-width: 768px) {
      .t-head, .t-row { font-size: 11px; padding: 8px 12px; }
      .header-stats { gap: 12px; }
      .stat-val { font-size: 18px; }
      .summary { flex-wrap: wrap; gap: 16px; }
      .modal { width: 95%; padding: 20px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, useRef } = React;

    const SUPABASE_URL = "https://uxpkqbioxoezjmcoylkw.supabase.co";
    const TIERS = ["Non-Member", "Patron", "Starter", "Green Jacket", "Unlimited"];
    const TIER_COLORS = {
      "Non-Member": "#78716c", Patron: "#4a7c59", Starter: "#2d6a9f",
      "Green Jacket": "#1a472a", Unlimited: "#a67c00",
    };
    const BAYS = ["Bay 1", "Bay 2"];

    function monthLabel(iso) {
      const d = new Date(iso);
      const n = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      return `${n[d.getUTCMonth()]} ${d.getUTCFullYear()}`;
    }

    // — Supabase helpers —
    async function supa(key, table, params = "") {
      const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}${params}`, {
        headers: { apikey: key, Authorization: `Bearer ${key}`, "Content-Type": "application/json", Prefer: "return=representation" },
      });
      if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
      return r.json();
    }

    async function supaPost(key, table, data) {
      const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
        method: "POST", headers: { apikey: key, Authorization: `Bearer ${key}`, "Content-Type": "application/json", Prefer: "return=representation,resolution=merge-duplicates" },
        body: JSON.stringify(data),
      });
      if (!r.ok) { const e = await r.text(); throw new Error(`${r.status}: ${e}`); }
      return r.json();
    }

    async function supaPatch(key, table, match, data) {
      const p = Object.entries(match).map(([k,v]) => `${k}=eq.${encodeURIComponent(v)}`).join("&");
      const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${p}`, {
        method: "PATCH", headers: { apikey: key, Authorization: `Bearer ${key}`, "Content-Type": "application/json", Prefer: "return=representation" },
        body: JSON.stringify(data),
      });
      if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
      return r.json();
    }

    async function supaDelete(key, table, match) {
      const p = Object.entries(match).map(([k,v]) => `${k}=eq.${encodeURIComponent(v)}`).join("&");
      const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${p}`, {
        method: "DELETE", headers: { apikey: key, Authorization: `Bearer ${key}`, "Content-Type": "application/json", Prefer: "return=representation" },
      });
      if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
      return r.json();
    }

    // — Toast hook —
    function useToast() {
      const [toast, setToast] = useState(null);
      const show = (msg, type = "success") => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 3000);
      };
      const el = toast ? React.createElement("div", { className: `toast ${toast.type}` }, toast.msg) : null;
      return { show, el };
    }

    // — Shared components —
    function TierBadge({ tier }) {
      return <span className="badge" style={{background: TIER_COLORS[tier] || '#888'}}>{tier}</span>;
    }
    function TierSelect({ value, onChange }) {
      return (
        <select className="tier-select" value={value} onChange={e => onChange(e.target.value)}>
          {TIERS.map(t => <option key={t} value={t}>{t}</option>)}
        </select>
      );
    }
    function hrs(n) { return Number(n).toFixed(1) + "h"; }
    function dlr(n) { return "$" + Number(n).toFixed(2); }
    function allowanceDisplay(n) { return Number(n) >= 99999 ? "∞" : Number(n) + "h"; }

    // — Modal wrapper —
    function Modal({ open, onClose, children }) {
      if (!open) return null;
      return (
        <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
          <div className="modal">{children}</div>
        </div>
      );
    }

    // — Confirm dialog —
    function ConfirmModal({ open, onClose, onConfirm, title, message, detail, confirmLabel = "Confirm", danger = false }) {
      return (
        <Modal open={open} onClose={onClose}>
          <div className="confirm-box">
            <h2 style={{fontSize:16,letterSpacing:2,textTransform:'uppercase',color: danger ? '#cc4455' : '#1a472a', marginBottom:16}}>{title}</h2>
            <p>{message}</p>
            {detail && <span className="muted">{detail}</span>}
            <div className="modal-actions" style={{justifyContent:'center'}}>
              <button className="act-btn" onClick={onClose}>Nevermind</button>
              <button className={`act-btn ${danger ? 'danger' : 'primary'}`} onClick={onConfirm}>{confirmLabel}</button>
            </div>
          </div>
        </Modal>
      );
    }

    // — Add/Edit Booking Modal —
    function BookingFormModal({ open, onClose, onSave, booking, customers }) {
      const isEdit = !!booking;
      const [email, setEmail] = useState("");
      const [name, setName] = useState("");
      const [date, setDate] = useState("");
      const [startTime, setStartTime] = useState("10:00");
      const [endTime, setEndTime] = useState("11:00");
      const [bay, setBay] = useState("Bay 1");
      const [notes, setNotes] = useState("");
      const [saving, setSaving] = useState(false);

      useEffect(() => {
        if (open && booking) {
          // Edit mode: populate from booking
          setEmail(booking.customer_email || "");
          setName(booking.customer_name || "");
          const s = new Date(booking.booking_start);
          const e = new Date(booking.booking_end);
          setDate(s.toISOString().slice(0, 10));
          setStartTime(s.toTimeString().slice(0, 5));
          setEndTime(e.toTimeString().slice(0, 5));
          setBay(booking.bay || "Bay 1");
          setNotes(booking.admin_notes || "");
        } else if (open) {
          // Add mode: defaults
          setEmail(""); setName("");
          const now = new Date();
          setDate(now.toISOString().slice(0, 10));
          setStartTime("10:00"); setEndTime("11:00");
          setBay("Bay 1"); setNotes("");
        }
      }, [open, booking]);

      // Auto-fill name when selecting from known customers
      function handleEmailChange(val) {
        setEmail(val);
        const match = customers.find(c => c.email === val);
        if (match) setName(match.name);
      }

      async function handleSave() {
        if (!email || !date || !startTime || !endTime) return;
        setSaving(true);
        const startDT = new Date(`${date}T${startTime}:00`);
        const endDT = new Date(`${date}T${endTime}:00`);
        const durationHrs = Math.max(0, (endDT - startDT) / 3600000);
        await onSave({
          customer_email: email.trim().toLowerCase(),
          customer_name: name.trim() || email.trim(),
          booking_start: startDT.toISOString(),
          booking_end: endDT.toISOString(),
          duration_hours: Math.round(durationHrs * 100) / 100,
          bay,
          booking_status: "Confirmed",
          ...(isEdit ? {} : { booking_id: `manual_${Date.now()}` }),
        });
        setSaving(false);
      }

      return (
        <Modal open={open} onClose={onClose}>
          <h2>{isEdit ? "Edit Booking" : "Add Manual Booking"}</h2>
          
          <div className="modal-field">
            <label>Customer Email</label>
            {isEdit ? (
              <input type="text" value={email} disabled style={{opacity:0.6}} />
            ) : (
              <>
                <input type="email" list="customer-list" value={email} onChange={e => handleEmailChange(e.target.value)} placeholder="customer@email.com" />
                <datalist id="customer-list">
                  {customers.map(c => <option key={c.email} value={c.email}>{c.name}</option>)}
                </datalist>
              </>
            )}
          </div>

          <div className="modal-field">
            <label>Customer Name</label>
            <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="Full name" />
          </div>

          <div className="modal-field">
            <label>Date</label>
            <input type="date" value={date} onChange={e => setDate(e.target.value)} />
          </div>

          <div style={{display:'flex', gap:12}}>
            <div className="modal-field" style={{flex:1}}>
              <label>Start Time</label>
              <input type="time" value={startTime} onChange={e => setStartTime(e.target.value)} />
            </div>
            <div className="modal-field" style={{flex:1}}>
              <label>End Time</label>
              <input type="time" value={endTime} onChange={e => setEndTime(e.target.value)} />
            </div>
          </div>

          {startTime && endTime && date && (
            <div style={{fontSize:12, color:'#888', marginBottom:12}}>
              Duration: {Math.max(0, (new Date(`${date}T${endTime}:00`) - new Date(`${date}T${startTime}:00`)) / 3600000).toFixed(1)}h
            </div>
          )}

          <div className="modal-field">
            <label>Bay</label>
            <select value={bay} onChange={e => setBay(e.target.value)}>
              {BAYS.map(b => <option key={b} value={b}>{b}</option>)}
            </select>
          </div>

          <div className="modal-actions">
            <button className="act-btn" onClick={onClose}>Cancel</button>
            <button className="act-btn primary" onClick={handleSave} disabled={saving || !email || !date}>
              {saving ? "Saving..." : isEdit ? "Save Changes" : "Add Booking"}
            </button>
          </div>
        </Modal>
      );
    }

    // — Main App —
    function App() {
      const [apiKey, setApiKey] = useState(localStorage.getItem("hg-key") || "");
      const [keyInput, setKeyInput] = useState(localStorage.getItem("hg-key") || "");
      const [connected, setConnected] = useState(false);
      const [error, setError] = useState("");
      const [loading, setLoading] = useState(false);
      const [members, setMembers] = useState([]);
      const [bookings, setBookings] = useState([]);
      const [tierConfig, setTierConfig] = useState([]);
      const [monthlyUsage, setMonthlyUsage] = useState([]);
      const [view, setView] = useState("overview");
      const [selectedMonth, setSelectedMonth] = useState(null);
      const [selectedMember, setSelectedMember] = useState(null);
      const [search, setSearch] = useState("");
      const [saving, setSaving] = useState(false);
      const [showCancelled, setShowCancelled] = useState(false);

      // Modal state
      const [addModalOpen, setAddModalOpen] = useState(false);
      const [editBooking, setEditBooking] = useState(null);
      const [cancelTarget, setCancelTarget] = useState(null);
      const [deleteTarget, setDeleteTarget] = useState(null);

      const toast = useToast();

      const connect = useCallback(async (key) => {
        if (!key) return;
        setError(""); setLoading(true);
        try {
          const [m, b, tc, mu] = await Promise.all([
            supa(key, "members", "?order=name"),
            supa(key, "bookings", "?order=booking_start.desc&limit=5000"),
            supa(key, "tier_config", "?order=display_order"),
            supa(key, "monthly_usage", "?order=billing_month.desc,overage_charge.desc"),
          ]);
          setMembers(m); setBookings(b); setTierConfig(tc); setMonthlyUsage(mu);
          setConnected(true); setApiKey(key);
          localStorage.setItem("hg-key", key);
        } catch (e) {
          setError(`Connection failed: ${e.message}`);
          setConnected(false);
        }
        setLoading(false);
      }, []);

      useEffect(() => { if (apiKey) connect(apiKey); }, []);

      const refresh = () => connect(apiKey);

      // — Booking management —
      async function handleCancelBooking() {
        if (!cancelTarget) return;
        setSaving(true);
        try {
          await supaPatch(apiKey, "bookings", { booking_id: cancelTarget.booking_id }, { booking_status: "Cancelled" });
          toast.show("Booking cancelled — monthly totals updated");
          setCancelTarget(null);
          await refresh();
        } catch (e) { toast.show(`Cancel failed: ${e.message}`, "error"); }
        setSaving(false);
      }

      async function handleDeleteBooking() {
        if (!deleteTarget) return;
        setSaving(true);
        try {
          await supaDelete(apiKey, "bookings", { booking_id: deleteTarget.booking_id });
          toast.show("Booking permanently deleted");
          setDeleteTarget(null);
          await refresh();
        } catch (e) { toast.show(`Delete failed: ${e.message}`, "error"); }
        setSaving(false);
      }

      async function handleSaveBooking(data) {
        setSaving(true);
        try {
          if (editBooking) {
            // Edit: patch existing
            await supaPatch(apiKey, "bookings", { booking_id: editBooking.booking_id }, data);
            toast.show("Booking updated");
            setEditBooking(null);
          } else {
            // Add new
            await supaPost(apiKey, "bookings", data);
            toast.show("Manual booking added");
            setAddModalOpen(false);
          }
          await refresh();
        } catch (e) { toast.show(`Save failed: ${e.message}`, "error"); }
        setSaving(false);
      }

      async function handleRestoreBooking(b) {
        setSaving(true);
        try {
          await supaPatch(apiKey, "bookings", { booking_id: b.booking_id }, { booking_status: "Confirmed" });
          toast.show("Booking restored");
          await refresh();
        } catch (e) { toast.show(`Restore failed: ${e.message}`, "error"); }
        setSaving(false);
      }

      async function updateTier(email, tier, name) {
        setSaving(true);
        try {
          const ex = members.find(m => m.email === email);
          if (ex) await supaPatch(apiKey, "members", { email }, { tier });
          else await supaPost(apiKey, "members", { email, name: name || email, tier });
          toast.show(`${name || email} → ${tier}`);
          await refresh();
        } catch (e) { toast.show(`Update failed: ${e.message}`, "error"); }
        setSaving(false);
      }

      // — Derived data —
      const allMonths = useMemo(() => {
        const s = new Set(monthlyUsage.map(r => r.billing_month));
        return [...s].sort().reverse();
      }, [monthlyUsage]);

      const activeMonth = selectedMonth || allMonths[0] || "";
      const currentData = useMemo(() => monthlyUsage.filter(r => r.billing_month === activeMonth), [monthlyUsage, activeMonth]);
      const membersMonth = currentData.filter(r => r.tier !== "Non-Member");
      const nonMembers = currentData.filter(r => r.tier === "Non-Member");
      const totalOverage = membersMonth.reduce((s, r) => s + Number(r.overage_charge || 0), 0);
      const totalMemberHrs = membersMonth.reduce((s, r) => s + Number(r.total_hours || 0), 0);

      const allCustomers = useMemo(() => {
        const map = {};
        bookings.forEach(b => {
          if (b.booking_status === "Cancelled") return; // skip cancelled in totals
          if (!map[b.customer_email]) map[b.customer_email] = { email: b.customer_email, name: b.customer_name, hrs: 0, cnt: 0 };
          map[b.customer_email].hrs += Number(b.duration_hours || 0);
          map[b.customer_email].cnt++;
          if (b.customer_name) map[b.customer_email].name = b.customer_name;
        });
        return Object.values(map).sort((a, b) => b.hrs - a.hrs);
      }, [bookings]);

      // Flat list of all known customers for autocomplete
      const customerList = useMemo(() => {
        const map = {};
        bookings.forEach(b => {
          if (!map[b.customer_email]) map[b.customer_email] = { email: b.customer_email, name: b.customer_name };
          if (b.customer_name) map[b.customer_email].name = b.customer_name;
        });
        return Object.values(map).sort((a,b) => (a.name||'').localeCompare(b.name||''));
      }, [bookings]);

      const selData = useMemo(() => {
        if (!selectedMember) return null;
        const memberBookings = bookings.filter(b => b.customer_email === selectedMember);
        return {
          member: members.find(m => m.email === selectedMember),
          bookings: showCancelled ? memberBookings : memberBookings.filter(b => b.booking_status !== "Cancelled"),
          allBookings: memberBookings,
          cancelledCount: memberBookings.filter(b => b.booking_status === "Cancelled").length,
          usage: monthlyUsage.filter(r => r.customer_email === selectedMember),
          customer: allCustomers.find(c => c.email === selectedMember),
        };
      }, [selectedMember, members, bookings, monthlyUsage, allCustomers, showCancelled]);

      // Setup screen
      if (!connected) {
        return (
          <div className="setup">
            <div className="logo" style={{fontSize:28,color:'#1a472a'}}>HOUR GOLF</div>
            <div className="logo-sub" style={{color:'#888',marginBottom:32}}>Member Usage Tracker</div>
            <label style={{display:'block',fontSize:12,fontWeight:700,letterSpacing:1,textTransform:'uppercase',color:'#555',marginBottom:8,textAlign:'left'}}>Supabase Anon API Key</label>
            <p style={{fontSize:12,color:'#999',marginBottom:12,textAlign:'left',lineHeight:1.5}}>
              Supabase → Settings → API → Project API keys → anon / public (starts with "eyJ...")
            </p>
            <input className="setup-input" type="password" value={keyInput} onChange={e => setKeyInput(e.target.value)} placeholder="eyJhbGciOiJIUzI1NiIs..." />
            {error && <p className="error">{error}</p>}
            <button className="setup-btn" onClick={() => connect(keyInput)} disabled={!keyInput || loading}>
              {loading ? "Connecting..." : "Connect"}
            </button>
          </div>
        );
      }

      return (
        <div>
          <header className="header">
            <div className="header-inner">
              <div>
                <div className="logo">HOUR GOLF</div>
                <div className="logo-sub">Member Usage Tracker</div>
              </div>
              <div className="header-stats">
                <div className="stat-box"><span className="stat-val">{members.length}</span><span className="stat-lbl">Members</span></div>
                <div className="stat-box"><span className="stat-val">{allCustomers.length}</span><span className="stat-lbl">Customers</span></div>
                <div className="stat-box"><span className="stat-val">{bookings.filter(b=>b.booking_status!=='Cancelled').length}</span><span className="stat-lbl">Bookings</span></div>
                <button className="refresh-btn" onClick={refresh} disabled={loading}>{loading ? "↻" : "↻ Refresh"}</button>
              </div>
            </div>
          </header>

          <nav className="nav">
            {[["overview","Monthly Overview"],["customers","All Customers"],["tiers","Tier Config"]].map(([k,l]) => (
              <button key={k} className={`nav-btn ${view===k?'active':''}`} onClick={() => {setView(k);setSelectedMember(null)}}>{l}</button>
            ))}
            {selData && <button className={`nav-btn ${view==='detail'?'active':''}`} onClick={() => setView('detail')}>{selData.customer?.name || selectedMember}</button>}
          </nav>

          {saving && <div className="saving-bar">Saving...</div>}

          {/* ===== MONTHLY OVERVIEW ===== */}
          {view === "overview" && (
            <div className="content">
              <div className="month-sel">
                {allMonths.map(m => <button key={m} className={`mo-btn ${m===activeMonth?'active':''}`} onClick={() => setSelectedMonth(m)}>{monthLabel(m)}</button>)}
              </div>

              {membersMonth.length > 0 && (
                <div className="summary">
                  <div className="sum-item"><span className="sum-val">{totalMemberHrs.toFixed(1)}h</span><span className="sum-lbl">Member Hours</span></div>
                  <div className="sum-item"><span className={`sum-val ${totalOverage>0?'red':'green'}`}>{dlr(totalOverage)}</span><span className="sum-lbl">Overage Due</span></div>
                  <div className="sum-item"><span className="sum-val">{membersMonth.filter(r => Number(r.overage_hours)>0).length}</span><span className="sum-lbl">Over Allotment</span></div>
                </div>
              )}

              {membersMonth.length > 0 && (<>
                <h2 className="section-head">Members — {monthLabel(activeMonth)}</h2>
                <div className="table">
                  <div className="t-head">
                    <span style={{flex:2}}>Member</span><span style={{flex:1}}>Tier</span>
                    <span style={{flex:1}} className="text-r">Used</span><span style={{flex:1}} className="text-r">Allotment</span>
                    <span style={{flex:1}} className="text-r">Overage</span><span style={{flex:1}} className="text-r">Charge</span>
                  </div>
                  {membersMonth.map(r => (
                    <div key={r.customer_email} className="t-row clickable" onClick={() => {setSelectedMember(r.customer_email);setView('detail')}}>
                      <span style={{flex:2}}><strong>{r.customer_name}</strong><br/><span className="email-sm">{r.customer_email}</span></span>
                      <span style={{flex:1}}><TierBadge tier={r.tier}/></span>
                      <span style={{flex:1}} className="text-r tab-num">{hrs(r.total_hours)}</span>
                      <span style={{flex:1}} className="text-r tab-num">{allowanceDisplay(r.included_hours)}</span>
                      <span style={{flex:1}} className={`text-r tab-num ${Number(r.overage_hours)>0?'red':''}`}>{Number(r.overage_hours)>0?hrs(r.overage_hours):"—"}</span>
                      <span style={{flex:1}} className={`text-r tab-num ${Number(r.overage_charge)>0?'red bold':''}`}>{Number(r.overage_charge)>0?dlr(r.overage_charge):"—"}</span>
                    </div>
                  ))}
                </div>
              </>)}

              <h2 className="section-head" style={{marginTop:32}}>Non-Members — {monthLabel(activeMonth)}</h2>
              <div className="table">
                <div className="t-head">
                  <span style={{flex:2}}>Customer</span><span style={{flex:1}} className="text-r">Hours</span>
                  <span style={{flex:1}} className="text-r">Sessions</span><span style={{flex:1}} className="text-r">Revenue</span>
                  <span style={{flex:1}} className="text-c">Assign</span>
                </div>
                {nonMembers.slice(0,25).map(r => (
                  <div key={r.customer_email} className="t-row">
                    <span style={{flex:2,cursor:'pointer'}} onClick={() => {setSelectedMember(r.customer_email);setView('detail')}}><strong>{r.customer_name}</strong><br/><span className="email-sm">{r.customer_email}</span></span>
                    <span style={{flex:1}} className="text-r tab-num">{hrs(r.total_hours)}</span>
                    <span style={{flex:1}} className="text-r tab-num">{r.booking_count}</span>
                    <span style={{flex:1}} className="text-r tab-num">${(Number(r.total_hours)*60).toFixed(0)}</span>
                    <span style={{flex:1}} className="text-c">
                      <select className="tier-select" value="Non-Member" onChange={e => updateTier(r.customer_email,e.target.value,r.customer_name)}>
                        <option value="Non-Member">—</option>
                        {TIERS.filter(t=>t!=='Non-Member').map(t => <option key={t} value={t}>{t}</option>)}
                      </select>
                    </span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ===== ALL CUSTOMERS ===== */}
          {view === "customers" && (
            <div className="content">
              <input className="search-input" type="text" placeholder="Search by name or email..." value={search} onChange={e => setSearch(e.target.value)} />
              <div className="table">
                <div className="t-head">
                  <span style={{flex:2}}>Customer</span><span style={{flex:1}}>Tier</span>
                  <span style={{flex:1}} className="text-r">Total Hours</span><span style={{flex:1}} className="text-r">Sessions</span>
                  <span style={{flex:1}} className="text-c">Assign</span>
                </div>
                {allCustomers.filter(c => {
                  const q = search.toLowerCase();
                  return (c.name||'').toLowerCase().includes(q) || c.email.toLowerCase().includes(q);
                }).map(c => {
                  const m = members.find(x => x.email === c.email);
                  const tier = m?.tier || 'Non-Member';
                  return (
                    <div key={c.email} className="t-row">
                      <span style={{flex:2,cursor:'pointer'}} onClick={() => {setSelectedMember(c.email);setView('detail')}}><strong>{c.name}</strong><br/><span className="email-sm">{c.email}</span></span>
                      <span style={{flex:1}}><TierBadge tier={tier}/></span>
                      <span style={{flex:1}} className="text-r tab-num">{c.hrs.toFixed(1)}h</span>
                      <span style={{flex:1}} className="text-r tab-num">{c.cnt}</span>
                      <span style={{flex:1}} className="text-c"><TierSelect value={tier} onChange={t => updateTier(c.email,t,c.name)}/></span>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* ===== TIER CONFIG ===== */}
          {view === "tiers" && (
            <div className="content">
              <h2 className="section-head">Tier Configuration</h2>
              <div className="table">
                <div className="t-head">
                  <span style={{flex:2}}>Tier</span><span style={{flex:1}} className="text-r">Monthly</span>
                  <span style={{flex:1}} className="text-r">Included</span><span style={{flex:1}} className="text-r">Overage Rate</span>
                  <span style={{flex:1}} className="text-r">Shop Discount</span>
                </div>
                {tierConfig.map(tc => (
                  <div key={tc.tier} className="t-row">
                    <span style={{flex:2}}><TierBadge tier={tc.tier}/></span>
                    <span style={{flex:1}} className="text-r tab-num">${Number(tc.monthly_fee).toFixed(0)}/mo</span>
                    <span style={{flex:1}} className="text-r tab-num">{Number(tc.included_hours)>=99999?"Unlimited":Number(tc.included_hours)+"h"}</span>
                    <span style={{flex:1}} className="text-r tab-num">${Number(tc.overage_rate)}/hr</span>
                    <span style={{flex:1}} className="text-r tab-num">{tc.pro_shop_discount}%</span>
                  </div>
                ))}
              </div>

              <h2 className="section-head" style={{marginTop:32}}>Current Members</h2>
              <div className="table">
                <div className="t-head">
                  <span style={{flex:2}}>Member</span><span style={{flex:1}}>Tier</span>
                  <span style={{flex:1}} className="text-r">Rate</span><span style={{flex:1}}>Stripe ID</span>
                </div>
                {members.map(m => (
                  <div key={m.email} className="t-row">
                    <span style={{flex:2}}><strong>{m.name}</strong><br/><span className="email-sm">{m.email}</span></span>
                    <span style={{flex:1}}><TierSelect value={m.tier} onChange={t => updateTier(m.email,t,m.name)}/></span>
                    <span style={{flex:1}} className="text-r tab-num">{m.monthly_rate?`$${Number(m.monthly_rate).toFixed(0)}`:"—"}</span>
                    <span style={{flex:1}}><span className="email-sm">{m.stripe_customer_id||"Not linked"}</span></span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ===== MEMBER DETAIL (with booking management) ===== */}
          {view === "detail" && selData && (
            <div className="content">
              <div className="detail-header">
                <div>
                  <h2 style={{margin:0,fontSize:18}}>{selData.customer?.name || selectedMember}</h2>
                  <span className="email-sm">{selectedMember}</span>
                </div>
                <div style={{display:'flex', gap:8, alignItems:'center'}}>
                  <button className="act-btn primary" onClick={() => { setEditBooking(null); setAddModalOpen(true); }}>+ Add Booking</button>
                  <TierSelect value={selData.member?.tier || 'Non-Member'} onChange={t => updateTier(selectedMember,t,selData.customer?.name)}/>
                </div>
              </div>

              <h3 className="section-head">Monthly Breakdown</h3>
              <div className="table">
                <div className="t-head">
                  <span style={{flex:1}}>Month</span><span style={{flex:1}} className="text-r">Hours</span>
                  <span style={{flex:1}} className="text-r">Allotment</span><span style={{flex:1}} className="text-r">Overage</span>
                  <span style={{flex:1}} className="text-r">Charge</span>
                </div>
                {selData.usage.map(u => (
                  <div key={u.billing_month} className="t-row">
                    <span style={{flex:1}}>{monthLabel(u.billing_month)}</span>
                    <span style={{flex:1}} className="text-r tab-num">{hrs(u.total_hours)}</span>
                    <span style={{flex:1}} className="text-r tab-num">{allowanceDisplay(u.included_hours)}</span>
                    <span style={{flex:1}} className={`text-r tab-num ${Number(u.overage_hours)>0?'red':''}`}>{Number(u.overage_hours)>0?hrs(u.overage_hours):"—"}</span>
                    <span style={{flex:1}} className={`text-r tab-num ${Number(u.overage_charge)>0?'red bold':''}`}>{Number(u.overage_charge)>0?dlr(u.overage_charge):"—"}</span>
                  </div>
                ))}
              </div>

              <h3 className="section-head" style={{marginTop:24}}>
                <span>All Bookings</span>
                <span style={{display:'flex', gap:8, alignItems:'center'}}>
                  {selData.cancelledCount > 0 && (
                    <button className="act-btn" style={{fontSize:10}} onClick={() => setShowCancelled(!showCancelled)}>
                      {showCancelled ? "Hide" : "Show"} {selData.cancelledCount} cancelled
                    </button>
                  )}
                  <button className="act-btn primary" style={{fontSize:10}} onClick={() => { setEditBooking(null); setAddModalOpen(true); }}>+ Add</button>
                </span>
              </h3>
              <div className="table">
                <div className="t-head">
                  <span style={{flex:2}}>Date</span>
                  <span style={{flex:1}}>Bay</span>
                  <span style={{flex:1}} className="text-r">Duration</span>
                  <span style={{flex:1}} className="text-r">Actions</span>
                </div>
                {selData.bookings.map((b,i) => {
                  const d = new Date(b.booking_start), e = new Date(b.booking_end);
                  const isCancelled = b.booking_status === "Cancelled";
                  const isManual = (b.booking_id || "").startsWith("manual_");
                  return (
                    <div key={b.booking_id || i} className={`t-row ${isCancelled ? 'cancelled' : ''}`}>
                      <span style={{flex:2}}>
                        {d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"})}
                        {" "}<span className="muted">{d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}–{e.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}</span>
                        {isManual && <span className="badge" style={{background:'#a67c00',marginLeft:6,fontSize:8,padding:'2px 6px'}}>MANUAL</span>}
                      </span>
                      <span style={{flex:1}}>{b.bay}</span>
                      <span style={{flex:1}} className="text-r tab-num">{hrs(b.duration_hours)}</span>
                      <span style={{flex:1}} className="text-r" style={{display:'flex', gap:4, justifyContent:'flex-end'}}>
                        {isCancelled ? (
                          <>
                            <button className="act-btn" style={{fontSize:10}} onClick={() => handleRestoreBooking(b)} disabled={saving}>Restore</button>
                            <button className="act-btn danger" style={{fontSize:10}} onClick={() => setDeleteTarget(b)} disabled={saving}>Delete</button>
                          </>
                        ) : (
                          <>
                            <button className="act-btn" style={{fontSize:10}} onClick={() => setEditBooking(b)} disabled={saving}>Edit</button>
                            <button className="act-btn danger" style={{fontSize:10}} onClick={() => setCancelTarget(b)} disabled={saving}>Cancel</button>
                          </>
                        )}
                      </span>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* ===== MODALS ===== */}
          <BookingFormModal
            open={addModalOpen || !!editBooking}
            onClose={() => { setAddModalOpen(false); setEditBooking(null); }}
            onSave={handleSaveBooking}
            booking={editBooking}
            customers={customerList}
          />

          <ConfirmModal
            open={!!cancelTarget}
            onClose={() => setCancelTarget(null)}
            onConfirm={handleCancelBooking}
            title="Cancel Booking"
            message={cancelTarget ? `Cancel ${cancelTarget.customer_name}'s booking on ${new Date(cancelTarget.booking_start).toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"})}?` : ""}
            detail="This will update monthly usage totals. You can restore it later."
            confirmLabel="Cancel Booking"
            danger
          />

          <ConfirmModal
            open={!!deleteTarget}
            onClose={() => setDeleteTarget(null)}
            onConfirm={handleDeleteBooking}
            title="Permanently Delete"
            message={deleteTarget ? `Permanently delete this booking? This cannot be undone.` : ""}
            detail={deleteTarget ? `${deleteTarget.customer_name} — ${new Date(deleteTarget.booking_start).toLocaleDateString()}` : ""}
            confirmLabel="Delete Forever"
            danger
          />

          {toast.el}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
